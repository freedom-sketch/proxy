name: Test on Windows

on:
  push:
    branches: [ main, feature/windows-support ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create config.json from example
        run: |
          echo "=== Creating minimal config.json from config.json.example ==="
          Copy-Item -Path "config.json.example" -Destination "config.json" -Force
          echo "Created config.json:"
          Get-Content "config.json"
        shell: pwsh

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build project
        run: cmake --build build --config Release

      - name: Check executable
        run: |
          echo "=== Checking executable ==="
          dir build\Release\not_proxy_srv.exe
          
          echo "=== Running with --help ==="
          .\build\Release\not_proxy_srv.exe --help
        shell: pwsh