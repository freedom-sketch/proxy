name: Test on Windows

on:
  push:
    branches: [ main, feature/windows-support ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    name: Build and Test on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create config.json from example
        run: |
          echo "=== Creating config.json ==="
          Copy-Item -Path "config.json.example" -Destination "config.json" -Force
        shell: pwsh

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build project
        run: cmake --build build --config Release

      - name: Test SOCKS5 Proxy
        run: |
          echo "=== Starting SOCKS5 proxy server in background ==="

          $server = Start-Process -FilePath ".\build\Release\not_proxy_srv.exe" `
                    -ArgumentList "--config config.json" `
                    -NoNewWindow -PassThru

          Start-Sleep -Seconds 5

          echo "=== Testing proxy with curl ==="
          curl --socks5 127.0.0.1:1080 -I --connect-timeout 10 --max-time 15 https://httpbin.org/ip

          if ($LASTEXITCODE -eq 0) {
            Write-Host "✅ SUCCESS: Proxy works on Windows!" -ForegroundColor Green
          } else {
            Write-Host "❌ FAILED: Test failed" -ForegroundColor Red
            exit 1
          }

          # Останавливаем сервер после теста
          Stop-Process -Id $server.Id -Force -ErrorAction SilentlyContinue
          echo "=== Server stopped ==="
        shell: pwsh